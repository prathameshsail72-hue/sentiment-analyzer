<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analyzer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
            text-align: center;
            font-size: 1.8rem;
        }
        p {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 1.5rem;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            resize: vertical;
            font-family: inherit;
            box-sizing: border-box;
            margin-bottom: 1.2rem;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result.positive {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .result.negative {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .result.error {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        .loader {
            display: none;
            text-align: center;
            margin-top: 1.5rem;
            color: #7f8c8d;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sentiment Analyzer</h1>
        <p>Enter your text below to analyze its sentiment using AI.</p>
        <textarea id="textInput" placeholder="Type your text here..."></textarea>
        <button id="analyzeBtn">Analyze Sentiment</button>
        
        <div id="loader" class="loader">
            <div class="spinner"></div>
            Analyzing...
        </div>
        
        <div id="result" class="result">
            <strong>Sentiment:</strong> <span id="label"></span><br>
            <strong>Confidence Score:</strong> <span id="score"></span>
        </div>
    </div>

    <script>
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const text = document.getElementById('textInput').value.trim();
            const btn = document.getElementById('analyzeBtn');
            const resultDiv = document.getElementById('result');
            const loader = document.getElementById('loader');
            const labelSpan = document.getElementById('label');
            const scoreSpan = document.getElementById('score');

            if (!text) {
                alert("Please enter some text to analyze.");
                return;
            }

            // Reset UI
            resultDiv.style.display = 'none';
            resultDiv.className = 'result';
            loader.style.display = 'block';
            btn.disabled = true;

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();
                loader.style.display = 'none';
                btn.disabled = false;

                if (response.ok) {
                    labelSpan.textContent = data.label;
                    scoreSpan.textContent = (data.score * 100).toFixed(2) + '%';
                    
                    if (data.label.toUpperCase() === 'POSITIVE') {
                        resultDiv.classList.add('positive');
                    } else if (data.label.toUpperCase() === 'NEGATIVE') {
                        resultDiv.classList.add('negative');
                    }
                    resultDiv.style.display = 'block';
                } else {
                    labelSpan.textContent = 'Error';
                    scoreSpan.textContent = data.error || 'Something went wrong';
                    resultDiv.classList.add('error');
                    resultDiv.style.display = 'block';
                }
            } catch (error) {
                loader.style.display = 'none';
                btn.disabled = false;
                labelSpan.textContent = 'Error';
                scoreSpan.textContent = "Failed to connect to the server.";
                resultDiv.classList.add('error');
                resultDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
